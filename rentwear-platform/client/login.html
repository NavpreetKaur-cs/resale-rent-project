<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to ReVesto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h2><a href="index.html" style="text-decoration: none; color: inherit;">ReVesto</a></h2>
            </div>
            <button class="hamburger" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-search">
                <input type="text" placeholder="Search for clothing..." id="searchBar">
                <button id="searchBtn">Search</button>
            </div>
            <div class="nav-auth">
                <button onclick="window.location.href='index.html'">Home</button>
                <button id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                <button id="signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                <button id="profile-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button id="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        <!-- Mobile Slide Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu-header">
                <h3>Menu</h3>
                <button class="close-menu" id="closeMenuBtn">&times;</button>
            </div>
            <div class="mobile-menu-content">
                <div class="mobile-search">
                    <input type="text" placeholder="Search for clothing..." id="mobileSearchBar">
                    <button id="mobileSearchBtn">Search</button>
                </div>
                <div class="mobile-auth">
                    <button onclick="window.location.href='index.html'">Home</button>
                    <button id="mobile-signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                    <button id="mobile-signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                    <button id="mobile-profile-btn" onclick="window.location.href='profile.html'">Profile</button>
                    <button id="mobile-logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="login-container">
        <h2>Login to ReVesto</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Sign up</a></p>
        <div id="message"></div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

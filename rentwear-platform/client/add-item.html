<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item - ReVogue</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/add-item.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h2><a href="index.html" style="text-decoration: none; color: inherit;">ReVogue</a></h2>
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Search for clothing..." id="searchBar">
                <button id="searchBtn">Search</button>
            </div>
            <div class="nav-auth">
                <button id="home-btn" onclick="window.location.href='index.html'">Home</button>
                <button id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                <button id="signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                <button id="profile-btn" style="display:none;" onclick="window.location.href='profile.html'">Profile</button>
                <button id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <main>
        <div class="add-item-container">
            <div class="add-item-box">
                <h2>Add Item for Sale or Rent</h2>
                <p class="subtitle">List your clothing items to sell or rent on ReVogue</p>

                <form id="itemForm">
                    <div class="form-group">
                        <label for="title">Item Title *</label>
                        <input type="text" id="title" placeholder="e.g., Red Silk Saree" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" required>
                                <option value="">Select Category</option>
                                <option value="casual">Casual</option>
                                <option value="ethnic">Ethnic</option>
                                <option value="wedding">Wedding</option>
                                <option value="party">Party</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="type">Type *</label>
                            <select id="type" required>
                                <option value="">Select Type</option>
                                <option value="resale">Resale</option>
                                <option value="rental">Rental</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Price (₹) *</label>
                            <input type="number" id="price" placeholder="0.00" min="0" step="0.01" required>
                        </div>

                        <div class="form-group">
                            <label for="deposit">Deposit (₹) <span class="hint">(for rental)</span></label>
                            <input type="number" id="deposit" placeholder="0.00" min="0" step="0.01">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="size">Size</label>
                            <input type="text" id="size" placeholder="e.g., XL, M, 32" maxlength="20">
                        </div>

                        <div class="form-group">
                            <label for="brand">Brand</label>
                            <input type="text" id="brand" placeholder="e.g., Sabyasachi" maxlength="50">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="condition">Condition</label>
                        <select id="condition">
                            <option value="new">New</option>
                            <option value="like_new">Like New</option>
                            <option value="gently_used">Gently Used</option>
                            <option value="heavily_used">Heavily Used</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" placeholder="Describe your item in detail (color, material, defects, etc.)" maxlength="500"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="images">Upload Images *</label>
                        <input type="file" id="images" multiple accept="image/*" required>
                        <p class="hint">Select one or more images to showcase your item</p>
                    </div>

                    <div id="imagePreview" class="image-preview"></div>

                    <div class="form-note">
                        <p><strong>Note:</strong> Rental is only available for Ethnic and Wedding category items.</p>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-submit">Add Item</button>
                        <button type="button" class="btn-cancel" onclick="window.location.href='resale.html'">Cancel</button>
                    </div>
                </form>

                <div id="message" class="message"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ReVogue. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/add-item.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contests</title>
    <link rel="stylesheet" href="css/contest.css">
    

</head>
<body>
<button class="home-back-btn" onclick="goHome()">Home</button>
<h1>🏆 Fashion Contests</h1>

<!-- MAIN OPTIONS -->
<div id="main-options">
    <button onclick="showCreate()">Create Contest</button>
    <button onclick="showJoin()">Join Contest</button>
</div>

<hr>

<!-- CREATE SECTION -->
<div id="create-section" style="display:none;">
    <button onclick="goBack()">⬅ Back</button>
    <h2>Create Contest</h2>

    <input type="text" id="contestTitle" placeholder="Title">
    <input type="text" id="theme" placeholder="Theme">
    <input type="text" id="category" placeholder="Category">

    <select id="gender">
        <option value="">Select Gender</option>
        <option value="Men">Men</option>
        <option value="Women">Women</option>
        <option value="Others">Others</option>
    </select>

    <input type="number" id="budget" placeholder="Budget">

    <button onclick="createContest()">Create</button>
    

</div>

<div id="Your contests" style="display:none;">
    <button onclick="goBack()">⬅ Back</button>
    <h2>Your Contests</h2>
    <div id="your-contests-list"></div>
</div>

<!-- JOIN SECTION -->
<div id="join-section" style="display:none;">
    <button onclick="goBack()">⬅ Back</button>
    <h2>Available Contests</h2>
    <div id="contest-list"></div>

    <hr>

    <h2>Submit Entry</h2>
    <input type="file" id="imageUpload">
    <input type="text" id="productLinks" placeholder="Links (comma separated)">
    <button onclick="submitEntry()">Submit</button>

    <hr>

    <h2>Leaderboard</h2>
    <div id="leaderboard"></div>
</div>
</body>
<script src="js/contest.js"></script>
</html>

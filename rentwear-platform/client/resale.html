<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resale Clothing - ReVesto</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/resale.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav class="top-nav">
    <div class="nav-container">
      <div class="nav-brand">
        <h2><a href="index.html" style="text-decoration: none; color: inherit;">ReVesto</a></h2>
      </div>
      <button class="hamburger" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-search">
        <input type="text" placeholder="Search for clothing..." id="searchBar">
        <button id="searchBtn">Search</button>
      </div>
      <div class="nav-auth">
        <button onclick="window.location.href='index.html'">Home</button>
        <button id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
        <button id="signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
        <button id="profile-btn" style="display:none;" onclick="window.location.href='profile.html'">Profile</button>
        <button id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
        <button id="cart-btn" onclick="window.location.href='cart.html'" style="position: relative;">
            🛒 Cart <span id="cart-count" style="background: #ff4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; position: absolute; top: -5px; right: -5px; display: none;">0</span>
        </button>
      </div>
    </div>
    <!-- Mobile Slide Menu -->
    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-menu-header">
        <h3>Menu</h3>
        <button class="close-menu" id="closeMenuBtn">&times;</button>
      </div>
      <div class="mobile-menu-content">
        <div class="mobile-search">
          <input type="text" placeholder="Search for clothing..." id="mobileSearchBar">
          <button id="mobileSearchBtn">Search</button>
        </div>
        <div class="mobile-auth">
          <button onclick="window.location.href='index.html'">Home</button>
          <button id="mobile-signin-btn" onclick="window.location.href='login.html'">Sign In</button>
          <button id="mobile-signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
          <button id="mobile-profile-btn" style="display:none;" onclick="window.location.href='profile.html'">Profile</button>
          <button id="mobile-logout-btn" style="display:none;" onclick="logout()">Logout</button>
          <button id="mobile-cart-btn" onclick="window.location.href='cart.html'">Cart</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="resale-container">
      <h2>Resale Clothing</h2>
      <div class="filters">
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="casual">Casual</option>
          <option value="ethnic">Ethnic</option>
          <option value="wedding">Wedding</option>
          <option value="party">Party</option>
        </select>
        <select id="typeFilter">
          <option value="resale">Resale Only</option>
          <option value="rental">Rental Only</option>
          <option value="">All Types</option>
        </select>
        <input type="number" id="maxPrice" placeholder="Max Price">
        <button id="applyFilters">Apply Filters</button>
        <button id="refreshBtn" onclick="loadResaleItems()" style="margin-left: 5px; background-color: #2196F3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">🔄 Refresh</button>
        <button id="addItemBtn" style="float:right;" onclick="window.location.href='add-item.html'">
              Add Item for Sale/Rent
        </button>

      </div>

      <div id="clothingList" class="clothing-grid">
        <div class="loading">Loading resale items...</div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/resale.js"></script>
</body>
</html>

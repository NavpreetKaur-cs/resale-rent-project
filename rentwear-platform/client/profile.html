<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ReVesto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>ReVesto</h2>
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Search for clothing..." id="searchBar">
                <button id="searchBtn">Search</button>
            </div>
            <div class="nav-auth">
                <button id="cart-btn" onclick="window.location.href='cart.html'" style="position: relative;">
                    Cart <span id="cart-count" style="background: #ff4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; position: absolute; top: -5px; right: -5px; display: none;">0</span>
                </button>
                <button id="home-btn" onclick="window.location.href='index.html'">Home</button>
                <button id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                <button id="signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                <button id="profile-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button id="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    <main>
        <div class="profile-container">
            <h2>My Profile</h2>
            <div id="profileInfo">
                <div class="loading">Loading profile...</div>
            </div>
            <div id="ordersSection" style="display: none;">
                <h3>My Orders</h3>
                <div id="userOrders" class="scrollable-orders">
                    <div class="loading">Loading orders...</div>
                </div>
            </div>
            <div id="sellerOrdersSection" style="display: none;">
                <h3>Customer Orders</h3>
                <div id="sellerOrders" class="scrollable-orders">
                    <div class="loading">Loading customer orders...</div>
                </div>
            </div>
            <div class="profile-actions">
                <button onclick="window.location.href='rent.html'">Browse Rentals</button>
                <button onclick="window.location.href='resale.html'">Browse Resale</button>
                <button id="addItemBtn" onclick="window.location.href='add-item.html'">Add Item for Sale/Rent</button>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>

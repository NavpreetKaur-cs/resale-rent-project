<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent Clothing - ReVesto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/rent.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>ReVesto</h2>
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Search for clothing..." id="searchBar">
                <button id="searchBtn">Search</button>
            </div>
            <div class="nav-auth">
                <button id="home-btn" onclick="window.location.href='index.html'">Home</button>
                <button id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                <button id="signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                <button id="profile-btn" style="display:none;" onclick="window.location.href='profile.html'">Profile</button>
                <button id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
                <button id="cart-btn" onclick="window.location.href='cart.html'" style="position: relative;">
                    🛒 Cart <span id="cart-count" style="background: #ff4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; position: absolute; top: -5px; right: -5px; display: none;">0</span>
                </button>
            </div>
        </div>
    </nav>
    <main>
        <div class="rent-container">
            <h2>Rent Clothing</h2>
            <div class="filters">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="ethnic">Ethnic</option>
                    <option value="wedding">Wedding</option>
                </select>
                <input type="number" id="maxPrice" placeholder="Max Price">
                <button id="applyFilters">Apply Filters</button>
                <button id="refreshBtn" onclick="loadRentalItems()" style="margin-left: 5px; background-color: #2196F3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">🔄 Refresh</button>
                <button id="addItemBtn" class="add-item-btn" onclick="window.location.href='add-item.html'">Add Item for Sale/Rent</button>
            </div>
            <div id="clothingList" class="clothing-grid">
                <div class="loading">Loading rental items...</div>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/rent.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ReVesto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h2><a href="index.html" style="text-decoration: none; color: inherit;">ReVesto</a></h2>
            </div>
            <button class="hamburger" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-search">
                <input type="text" placeholder="Search for clothing..." id="searchBar">
                <button id="searchBtn">Search</button>
            </div>
            <div class="nav-auth">
                <button id="home-btn" onclick="window.location.href='index.html'">Home</button>
                <button id="signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                <button id="signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                <button id="profile-btn" style="display:none;" onclick="window.location.href='profile.html'">Profile</button>
                <button id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
            </div>
        </div>
        <!-- Mobile Slide Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu-header">
                <h3>Menu</h3>
                <button class="close-menu" id="closeMenuBtn">&times;</button>
            </div>
            <div class="mobile-menu-content">
                <div class="mobile-search">
                    <input type="text" placeholder="Search for clothing..." id="mobileSearchBar">
                    <button id="mobileSearchBtn">Search</button>
                </div>
                <div class="mobile-auth">
                    <button id="mobile-home-btn" onclick="window.location.href='index.html'">Home</button>
                    <button id="mobile-signin-btn" onclick="window.location.href='login.html'">Sign In</button>
                    <button id="mobile-signup-btn" onclick="window.location.href='register.html'">Sign Up</button>
                    <button id="mobile-profile-btn" style="display:none;" onclick="window.location.href='profile.html'">Profile</button>
                    <button id="mobile-logout-btn" style="display:none;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="cart-container">
            <h2>Shopping Cart</h2>

            <div class="cart-content">
                <div class="cart-items-section">
                    <div id="cartItemsList" class="cart-items">
                        <div class="loading">Loading cart items...</div>
                    </div>
                </div>

                <div class="cart-summary-section">
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">₹0</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (18%):</span>
                            <span id="tax">₹0</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="total">₹0</span>
                        </div>
                        <button id="checkoutBtn" class="btn-checkout">Proceed to Checkout</button>
                        <button onclick="window.location.href='resale.html'" class="btn-continue">Continue Shopping</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ReVesto. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000';

        document.addEventListener('DOMContentLoaded', function() {
            updateNavButtons();
            initMobileMenu();
            displayCartItems();
            updateSummary();

            const checkoutBtn = document.getElementById('checkoutBtn');
            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', proceedToCheckout);
            }
        });

        function displayCartItems() {
            const cart = getCart();
            const cartList = document.getElementById('cartItemsList');

            if (cart.length === 0) {
                cartList.innerHTML = '<div class="empty-cart"><p>Your cart is empty</p><button onclick="window.location.href=\'resale.html\'" class="btn-shop">Start Shopping</button></div>';
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }

            cartList.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="item-image">
                        ${item.images && item.images.length > 0 
                            ? `<img src="${item.images[0]}" alt="${item.title}">`
                            : '<div class="no-image">No Image</div>'}
                    </div>
                    <div class="item-info">
                        <h4>${item.title}</h4>
                        <p><strong>Type:</strong> ${item.type}</p>
                        <p><strong>Category:</strong> ${item.category}</p>
                        <p><strong>Seller:</strong> ${item.seller?.name || 'Unknown'}</p>
                        <p><strong>Price:</strong> ₹${item.price}</p>
                    </div>
                    <div class="item-quantity">
                        <label>Quantity:</label>
                        <div class="quantity-control">
                            <button onclick="decreaseQuantity('${item._id}')">−</button>
                            <input type="number" value="${item.quantity || 1}" min="1" onchange="updateQuantity('${item._id}', this.value)">
                            <button onclick="increaseQuantity('${item._id}')">+</button>
                        </div>
                    </div>
                    <div class="item-total">
                        <p>₹${(item.price * (item.quantity || 1)).toFixed(2)}</p>
                    </div>
                    <div class="item-actions">
                        <button onclick="removeItemFromCart('${item._id}')" class="btn-remove">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function increaseQuantity(itemId) {
            const cart = getCart();
            const item = cart.find(i => i._id === itemId);
            if (item) {
                item.quantity = (item.quantity || 1) + 1;
                saveCart(cart);
                displayCartItems();
                updateSummary();
            }
        }

        function decreaseQuantity(itemId) {
            const cart = getCart();
            const item = cart.find(i => i._id === itemId);
            if (item && (item.quantity || 1) > 1) {
                item.quantity = (item.quantity || 1) - 1;
                saveCart(cart);
                displayCartItems();
                updateSummary();
            }
        }

        function updateQuantity(itemId, value) {
            const qty = parseInt(value);
            if (qty > 0) {
                updateCartItemQuantity(itemId, qty);
                displayCartItems();
                updateSummary();
            }
        }

        function removeItemFromCart(itemId) {
            if (confirm('Remove this item from cart?')) {
                removeFromCart(itemId);
                displayCartItems();
                updateSummary();
            }
        }

        function updateSummary() {
            const subtotal = getCartTotal();
            const tax = subtotal * 0.18;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = '₹' + subtotal.toFixed(2);
            document.getElementById('tax').textContent = '₹' + tax.toFixed(2);
            document.getElementById('total').textContent = '₹' + total.toFixed(2);
        }

        async function proceedToCheckout() {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            const cart = getCart();
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }

            try {
                // Process each item in cart
                const orders = [];
                for (const item of cart) {
                    const response = await fetch(`${API_BASE}/api/orders`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${getToken()}`
                        },
                        body: JSON.stringify({
                            productId: item._id,
                            orderType: item.type,
                            rentalDays: item.type === 'rental' ? 7 : undefined
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        orders.push(data);
                    } else {
                        alert(`Failed to place order for ${item.title}: ${data.message}`);
                        return;
                    }
                }

                alert('All orders placed successfully!');
                clearCart();
                window.location.href = 'profile.html';
            } catch (error) {
                console.error('Error during checkout:', error);
                alert('Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
